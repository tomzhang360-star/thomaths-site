<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 - Thomas Tutoring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<header class="bg-primary text-white text-center py-4">
    <h1>联系我们</h1>
    <p class="lead">欢迎填写表单，我们会尽快联系您</p>
</header>

<main class="container my-5">
    <form>
        <div class="mb-3">
            <label for="name" class="form-label">您的姓名</label>
            <input type="text" class="form-control" id="name" placeholder="请输入您的姓名">
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">电子邮箱</label>
            <input type="email" class="form-control" id="email" placeholder="请输入邮箱">
        </div>
        <div class="mb-3">
            <label for="message" class="form-label">留言</label>
            <textarea class="form-control" id="message" rows="4" placeholder="请填写您的留言"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">发送</button>
    </form>
</main>

<footer class="bg-dark text-white text-center py-3">
    <p class="mb-0">© 2025 Thomas Tutoring. 保留所有权利.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
