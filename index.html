<!DOCTYPE html> <!-- 声明这是 HTML5 文档 -->
<html lang="zh-CN"> <!-- 页面主语言是简体中文 -->

<head>
    <meta charset="UTF-8"> <!-- 设置字符编码为 UTF-8，支持中文 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- 让页面在手机上自适应 -->
    <title>Thomas Tutoring 首页</title> <!-- 浏览器标签上的标题 -->

    <!-- 引入 Bootstrap 5 的 CSS，用于快速美化页面 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- 这里以后可以引入自己的 CSS 文件，比如 style.css -->
</head>

<body class="bg-light"> <!-- 给整个页面加一个浅色背景 -->

    <!-- 页头区域 -->
    <header class="bg-primary text-white text-center py-5">
        <!-- bg-primary：蓝色背景，text-white：白色文字，text-center：居中，py-5：上下内边距 -->
        <h1 class="display-4">G9–G12 数学·物理系统提升</h1> <!-- 大标题 -->
        <p class="lead">AP / IB / 安省课程 | 22年经验 | 小班+私教 | 真题导向与错题跟踪</p> <!-- 副标题 -->
        <a href="contact.html" class="btn btn-warning btn-lg m-2">预约 20 分钟免费评估</a> <!-- 按钮1 -->
        <a href="courses.html" class="btn btn-outline-light btn-lg m-2">查看课程</a> <!-- 按钮2 -->
    </header>

    <!-- 特色版块 -->
    <section class="container my-5">
        <!-- container：内容居中，my-5：上下外边距 -->
        <div class="row text-center">
            <!-- row：Bootstrap 栅格行，text-center：文字居中 -->

            <div class="col-md-4 mb-4">
                <!-- col-md-4：中等屏幕以上占4格，mb-4：下外边距 -->
                <h3>双轨教学</h3>
                <p>小班讲解 + 私教纠错</p>
            </div>

            <div class="col-md-4 mb-4">
                <h3>课程覆盖</h3>
                <p>安省 G9–G12 · AP · IB</p>
            </div>

            <div class="col-md-4 mb-4">
                <h3>家校沟通</h3>
                <p>作业记录与错题跟踪</p>
            </div>
        </div>
    </section>

    <!-- 家长评价 -->
    <section class="bg-white py-5">
        <div class="container">
            <h2 class="text-center mb-4">家长反馈</h2>

            <blockquote class="blockquote text-center">
                <!-- blockquote：引用样式 -->
                <p class="mb-0">张老师耐心细致，孩子物理从 70+ 提升到 90+。</p>
                <footer class="blockquote-footer">Tony 妈妈 <cite title="G11 物理">G11 物理</cite></footer>
            </blockquote>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="bg-dark text-white text-center py-3">
        <p class="mb-0">© 2025 Thomas Tutoring. 保留所有权利.</p>
    </footer>

    <!-- 引入 Bootstrap 的 JavaScript（用于交互组件） -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
